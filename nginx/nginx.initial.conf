# Use this BEFORE obtaining SSL certificate.
# After certbot runs successfully, switch to nginx.conf
#
# Steps:
#   1. cp nginx.initial.conf nginx.conf
#   2. docker compose up -d nginx
#   3. docker compose run --rm certbot certonly --webroot -w /var/www/certbot -d altinorducilingircim.com.tr -d www.altinorducilingircim.com.tr
#   4. cp nginx.ssl.conf nginx.conf   (rename the main nginx.conf back)
#   5. docker compose restart nginx

events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name altinorducilingircim.com.tr www.altinorducilingircim.com.tr;

        # Certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Proxy to Next.js (temporary HTTP-only)
        location / {
            proxy_pass http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
