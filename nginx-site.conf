# Upstream - fail hızlı algılansın
upstream nextjs_backend {
    server 127.0.0.1:3090 max_fails=1 fail_timeout=3s;
}

# Proxy cache zone: 100MB RAM keys, 500MB disk, inactive 10dk
proxy_cache_path /var/cache/nginx/orducilingir
    levels=1:2
    keys_zone=orducilingir_cache:100m
    max_size=500m
    inactive=60m
    use_temp_path=off;

server {
    listen 80;
    server_name orducilingircim.com.tr www.orducilingircim.com.tr;

    # Cloudflare gerçek IP'leri al
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    # Gzip sıkıştırma
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Admin & API - ASLA CACHE'LEME
    location /admin {
        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location /api {
        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store";
    }

    # Next.js static assets - uzun cache, immutable
    location /_next/static {
        proxy_pass http://nextjs_backend;
        proxy_cache orducilingir_cache;
        proxy_cache_valid 200 365d;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Next.js image optimization - URL'de query params var, her farklı resim farklı key
    location /_next/image {
        proxy_pass http://nextjs_backend;
        proxy_cache orducilingir_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Harici image proxy (googleusercontent vs) - uzun cache, URL değişince yeni key
    location ~* \.(jpg|jpeg|png|gif|webp|avif|svg|ico)$ {
        proxy_pass http://nextjs_backend;
        proxy_cache orducilingir_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Sadece admin session cookie varsa cache'leme, diğer cookieleri (Cloudflare vs) yoksay
    set $skip_cache 0;
    if ($cookie_session) {
        set $skip_cache 1;
    }

    # Public sayfalar - kısa cache + backend düşünce stale servis et
    location / {
        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache ayarları
        proxy_cache orducilingir_cache;
        proxy_cache_valid 200 2m;
        proxy_cache_valid 404 10s;
        proxy_cache_key "$scheme$request_method$host$request_uri";

        # Backend düşünce eski cache'i sun (deploy sırasında site açık kalır)
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;

        # Sadece admin oturumu varsa cache atla
        proxy_no_cache $skip_cache;
        proxy_cache_bypass $skip_cache;

        add_header X-Cache-Status $upstream_cache_status;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    client_max_body_size 10M;
}
