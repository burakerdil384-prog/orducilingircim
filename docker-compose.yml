services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MOCK_DB=false
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@host.docker.internal:5432/ordu_cilingir?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_SITE_URL=https://altinorducilingircim.com.tr
      - NEXT_PUBLIC_SITE_NAME=Ordu Çilingir
      - NEXT_PUBLIC_PHONE=0554 127 92 92
      - NEXT_PUBLIC_PHONE_RAW=+905541279292
      - NEXT_PUBLIC_WHATSAPP=905541279292
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
