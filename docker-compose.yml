services:
  # Next.js Application (host network - uses host PG & Redis directly)
  app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host
    environment:
      - MOCK_DB=false
      - PORT=3090
      - HOSTNAME=127.0.0.1
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@127.0.0.1:5432/ordu_cilingir?schema=public
      - REDIS_URL=redis://127.0.0.1:6379
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_SITE_URL=https://orducilingircim.com.tr
      - NEXT_PUBLIC_SITE_NAME=Ordu Çilingir
      - NEXT_PUBLIC_PHONE=0554 127 92 92
      - NEXT_PUBLIC_PHONE_RAW=+905541279292
      - NEXT_PUBLIC_WHATSAPP=905541279292
      - NEXT_PUBLIC_GA_ID=G-D17KKWDL9L
